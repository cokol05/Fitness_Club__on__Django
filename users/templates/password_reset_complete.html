{% extends 'base.html' %}

{% block title %}Пароль изменен{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">Пароль успешно изменен!</h3>
                </div>
                <div class="card-body text-center">
                    <i class="fas fa-check-circle fa-4x text-success mb-3"></i>
                    <p>Ваш пароль был успешно изменен.</p>
                    <p>Теперь вы можете войти в систему с новым паролем.</p>
                    <a href="{% url 'users:login' %}" class="btn btn-primary mt-3">Войти</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
